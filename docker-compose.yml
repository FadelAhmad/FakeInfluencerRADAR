version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    ports:
      - "8000:8000"
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - API_URL=http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
